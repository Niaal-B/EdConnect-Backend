name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem

      - name: Deploy to EC2
        run: |
          cat <<'EOF' > deploy_script.sh
          #!/bin/bash
          set -e
          echo "🚀 Starting deployment on server at $(date)"
          cd /home/ubuntu/EdConnect-Backend
          
          echo "Current Directory: $(pwd)"
          echo "Current Branch: $(git branch --show-current)"
          
          echo "Pulling latest changes..."
          git pull
          
          echo "Rebuilding and Restarting Containers..."
          sudo docker compose down
          sudo docker compose up -d --build
          
          echo "Deployment Successful at $(date)"
          EOF

          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem deploy_script.sh ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/deploy_script.sh
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key.pem ubuntu@${{ secrets.EC2_HOST }} "sudo bash /home/ubuntu/deploy_script.sh"